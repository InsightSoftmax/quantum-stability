name: Submit Benchmark

on:
  schedule:
    # Every Monday at 12:00 UTC
    - cron: "0 12 * * 1"
  workflow_dispatch:
    inputs:
      platform:
        description: "Platform(s) to submit (comma-separated, or empty for all enabled)"
        required: false
        default: ""
      dry_run:
        description: "Dry run: local simulator only (no cloud calls, no cost)"
        required: false
        type: boolean
        default: false
      simulator:
        description: "Cloud simulator: Braket SV1 / AQT simulator_noise (creds required, no QPU cost)"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  submit:
    name: Submit circuits
    runs-on: ubuntu-latest
    environment: quantum-production

    permissions:
      contents: write   # to commit pending job files
      id-token: write   # for OIDC

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-west-1   # Rigetti Ankaa-3 is in us-west-1; S3 bucket must match

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Submit jobs
        env:
          BRAKET_RESULTS_BUCKET_WEST: ${{ vars.BRAKET_RESULTS_BUCKET_WEST }}
          AQT_API_KEY: ${{ secrets.AQT_API_KEY }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
          USE_SIMULATOR: ${{ inputs.simulator || 'false' }}
          PLATFORM: ${{ inputs.platform || '' }}
        run: uv run python scripts/submit_benchmark.py

      - name: Commit pending job files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pending/
          git diff --staged --quiet || git commit -m "chore: submit benchmark $(date -u +%Y-%m-%d)"
          git pull --rebase && git push
